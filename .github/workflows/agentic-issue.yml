# When an issue is labeled "agent", create a branch and a draft PR so an agent can pick it up.
# Merge that PR to deploy (e.g. Vercel deploys on push to main).
name: Agentic issue

on:
  issues:
    types: [labeled]

jobs:
  create-branch-and-pr:
    if: github.event.label.name == 'agent'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Get issue number and title
        id: issue
        run: |
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          TITLE="${{ github.event.issue.title }}"
          SLUG=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-40)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch and draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="issue-${{ steps.issue.outputs.number }}-${{ steps.issue.outputs.slug }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          BODY="Closes #${{ github.event.issue.number }}"
          BODY="$BODY"$'\n\n'"Draft PR created from issue. Implement the changes (e.g. in Cursor: \"Implement issue #${{ github.event.issue.number }}\") and push to this branch."
          gh pr create --draft --base main --head "$BRANCH" --title "${{ github.event.issue.title }}" --body "$BODY"
          PR_URL=$(gh pr view --json url -q .url)
          echo "pr_url=$PR_URL" >> $GITHUB_ENV

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Agent branch and draft PR created.\n\n**PR:** ${process.env.PR_URL}\n\nImplement the issue (e.g. in Cursor: "Implement issue #${context.issue.number}") and push; then merge the PR to deploy.`
            });
